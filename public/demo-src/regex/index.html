<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RegEx Word Count</title>
    <link rel="stylesheet" href="/demo-src/_lib/css/bootstrap.min.css">
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 2rem;
        background: #fbf7f5;
      }
      h1 { margin-top: 0; }
      .project { text-align: center; }
      #wordCountOutput { margin-top: 1rem; font-size: 1rem; }
      .disclaimer { margin-top: 1rem; font-size: 0.875rem; color: #888; text-align: center; }
    </style>
  </head>
  <body>
    <h1>RegEx — 77kids Word Count</h1>
    <div class="project">
      <textarea
        tabindex="2"
        id="essayDesc"
        name="essayDesc"
        rows="7"
        cols="35"
        placeholder="Please enter your words here..."
        onkeyup="liveCount()"
        onblur="liveCount()"
        style="width:90%"></textarea>
      <div id="wordCountOutput"></div>
    </div>
    <div class="disclaimer">For this demo, the word limit is set to 10.</div>
    <script src="js/main.js"></script>
  </body>
</html>
