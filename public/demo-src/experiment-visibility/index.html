<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Adobe Target Debugger</title>
    <link rel="stylesheet" href="/demo-src/_lib/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/debugger.css">
    <script src="/demo-src/_lib/js/jquery.js"></script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 2rem;
        background: #fbf7f5;
      }
      h1 { margin-top: 0; }
      .project { position: relative; min-height: 500px; }
      .project picture img { max-width: 100%; height: auto; }
    </style>
  </head>
  <body>
    <h1>Adobe Target Debugger</h1>
    <div class="project" id="project">
      <picture class="elem1">
        <source media="(min-width:670px)" srcset="./images/xt.jpg">
        <img src="./images/xt_sm.jpg" alt="">
      </picture>
      <picture class="elem2">
        <source media="(min-width:670px)" srcset="./images/ab.jpg">
        <img src="./images/ab_sm.jpg" alt="">
      </picture>
      <picture class="elem3">
        <source media="(min-width:670px)" srcset="./images/rec.jpg">
        <img src="./images/rec_sm.jpg" alt="">
      </picture>
    </div>
    <script src="js/utag_sync.js"></script>
    <script src="js/activities.js"></script>
    <script src="js/debugger.js"></script>
  </body>
</html>
